<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product List</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>

<div class="container my-2">
    <h2>Product' List</h2>
    <a th:href="@{/product/create}" class="btn btn-primary btn-sm mb-3">Create Product</a>

    <table border="1" class="table table-striped table-responsive-md">
        <thead>
        <tr>
            <th scope="col" style="width: 45%;">Product Name</th>
            <th scope="col" style="width: 40%;">Quantity</th>
            <th scope="col" style="width: 15%;">Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}" th:data-id="${product.productId}">
            <td class="editable"
                data-field="productName"
                th:text="${product.productName}"></td>

            <td class="editable" data-field="productQuantity"
                th:text="${product.productQuantity}"></td>
            <td>
                <button class="btn btn-danger btn-sm delete-btn"
                        onclick="deleteProduct(this)"
                        th:data-id="${product.productId}">
                    Delete
                </button>
                <button class="btn btn-danger btn-sm delete-btn"
                        onclick="editProduct(this)"
                        th:data-id="${product.productId}">
                    Delete
                </button>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
<script src="//cdn-script.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        integrity="1H217gwSVyLSIfaLxHbE7dRb3v4mYCKbpQvzx0cegeju1MVsGrX5xXxAvs/HgeFs"
        type="text/javascript"></script>

<script>

    function deleteProduct(button) {
        const id = button.dataset.id;
        const formData = new URLSearchParams();
        formData.append('productId', id);

        fetch('/product/delete', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: formData
        }).then(response => {
            if (response.ok) {
                window.location.reload();
            } else {
                console.error('Failed to delete the product.');
            }
        })
            .catch(error => {
                console.error('Error:', error);
            });
    }

    function editProduct(button) {
        const id = button.dataset.id;
        window.location.href = `/product/edit/${id}`;
    }

</script>
</body>
</html>
